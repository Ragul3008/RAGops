# Security Scanning
name: Security

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Container scanning
        uses: aquasecurity/trivy-action@v0.20.0
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency audit
        run: snyk test --all-projects