# CI Pipeline
name: RAGOps CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: services/auth:services/shared

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest services/auth/ -v --cov=services/auth/app

      - name: Lint
        run: |
          ruff check .
          mypy services/

      - name: Security scan
        run: |
          bandit -r services/ --skip B101,B106,B112