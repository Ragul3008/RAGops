# CI Pipeline
name: RAGOps CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: pytest services/ -v --cov
      - name: Lint
        run: ruff check . && mypy .
      - name: Security scan
        run: bandit -r services/