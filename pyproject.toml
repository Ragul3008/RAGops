[tool.ruff]
target-version = "py312"
select = ["E","F","I","B","S","UP"]
ignore  = ["S101"]

[tool.mypy]
python_version     = "3.12"
strict             = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["services"]
addopts      = "-v --tb=short"

[tool.coverage.run]
source = ["services"]
omit   = ["*/tests/*","*/migrations/*"]