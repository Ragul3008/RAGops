[tool.ruff]
target-version = "py312"
select = ["E","F","I","B","S","UP"]
ignore  = ["S101", "E501", "F541", "S113", "I001", "B008", "S105", "S106", "S603", "S110", "S112", "B904", "B905", "S602"]
exclude = [
    "services/embedding",
    "services/evaluation",
    "services/rag-engine",
    "services/retrieval",
    "services/monitoring"
]





[tool.mypy]
python_version     = "3.12"
strict             = false
ignore_missing_imports = true
exclude = "services/(embedding|evaluation|rag-engine|retrieval|monitoring|shared)/"



[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["services"]
addopts      = "-v --tb=short"

[tool.coverage.run]
source = ["services"]
omit   = ["*/tests/*","*/migrations/*"]