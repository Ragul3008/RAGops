global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'embedding-service'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'rag-engine'
    static_configs:
      - targets: ['host.docker.internal:8003']
